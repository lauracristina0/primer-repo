<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería con Filtros - POO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbfb; margin: 0; padding: 20px; color: #333; }
        .cabecera { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .chip { padding: 8px 18px; border: 2px solid #e2ebf0; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; color: #555; }
        .chip.activo { background: #b794f4; color: white; border-color: #b794f4; }
        .barra-top { display: flex; gap: 15px; margin-bottom: 15px; }
        .busqueda, .selector-orden { flex: 1; padding: 12px; font-size: 15px; border: 2px solid #e2ebf0; border-radius: 10px; box-sizing: border-box; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .card-emoji { font-size: 50px; margin-bottom: 10px; }
        .card-nombre { font-weight: bold; font-size: 16px; margin: 5px 0; color: #2d3436; }
        .card-precio { color: #b794f4; font-weight: bold; font-size: 18px; }
        .card-cat { font-size: 11px; background: #f4f6f9; color: #555; padding: 4px 10px; border-radius: 10px; display: inline-block; margin-top: 10px; font-weight: bold; }
        .btn-fav { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.3; transition: 0.2s; }
        .btn-fav.es-fav { opacity: 1; color: #e74c3c; }
        .stats-bar { background: #e2f0cb; border-radius: 10px; padding: 12px; font-size: 14px; color: #1b4332; font-weight: bold; display: flex; justify-content: space-between;}
    </style>
</head>
<body>

<div class="cabecera">
    <h2 style="margin-top: 0;">Tienda Tech & Estudio</h2>
    <div class="barra-top">
        <input class="busqueda" id="busqueda" type="text" placeholder="🔍 Buscar recursos..." oninput="tienda.filtrar()">
        <!-- Reto 1: Ordenamiento -->
        <select class="selector-orden" id="orden" onchange="tienda.filtrar()">
            <option value="defecto">Recomendados</option>
            <option value="precioAsc">Precio: Menor a Mayor</option>
            <option value="precioDesc">Precio: Mayor a Menor</option>
            <option value="nombreAz">Nombre: A - Z</option>
        </select>
    </div>
    <div class="filtros" id="filtros"></div>
    <div class="stats-bar" id="stats-bar"></div>
</div>

<div class="grid" id="grid-productos"></div>

<script>
    class Producto {
        constructor(id, nombre, precio, categoria, emoji) {
            this.id = id;
            this.nombre = nombre;
            this.precio = precio;
            this.categoria = categoria;
            this.emoji = emoji;
            this.favorito = false; // Reto 2
            this.vistos = 0;       // Reto 3
        }
    }

    class Tienda {
        constructor(productos) {
            this.productos = productos;
            this.categoriaActiva = "Todos";
            this.verSoloFavoritos = false;
            this.vistosGlobales = 0;
            this.construirFiltros();
            this.filtrar();
        }

        obtenerCategorias() {
            const cats = ["Todos", "⭐ Favoritos"];
            this.productos.forEach(p => {
                if (!cats.includes(p.categoria)) cats.push(p.categoria);
            });
            return cats;
        }

        construirFiltros() {
            const cont = document.getElementById("filtros");
            cont.innerHTML = "";
            this.obtenerCategorias().forEach(cat => {
                let isActive = false;
                if (cat === "⭐ Favoritos") {
                    isActive = this.verSoloFavoritos && this.categoriaActiva === "Todos";
                } else {
                    isActive = !this.verSoloFavoritos && cat === this.categoriaActiva;
                }
                
                const clase = isActive ? "chip activo" : "chip";
                cont.innerHTML += `<button class="${clase}" onclick="tienda.setFiltro('${cat}')">${cat}</button>`;
            });
        }

        setFiltro(cat) {
            if (cat === "⭐ Favoritos") {
                this.verSoloFavoritos = true;
                this.categoriaActiva = "Todos";
            } else {
                this.verSoloFavoritos = false;
                this.categoriaActiva = cat;
            }
            this.construirFiltros();
            this.filtrar();
        }

        toggleFavorito(id) {
            const prod = this.productos.find(p => p.id === id);
            if(prod) prod.favorito = !prod.favorito;
            this.filtrar();
        }

        registrarVista(id) {
            const prod = this.productos.find(p => p.id === id);
            if(prod) {
                prod.vistos++;
                this.vistosGlobales++;
                document.getElementById(`vistos-${id}`).innerText = `👁️ ${prod.vistos}`;
                document.getElementById("vistos-totales").innerText = `Interacciones globales: ${this.vistosGlobales}`;
            }
        }

        filtrar() {
            const busq = document.getElementById("busqueda").value.toLowerCase();
            const orden = document.getElementById("orden").value;
            
            // 1. Filtrar
            let resultado = this.productos.filter(p => {
                const coincideCategoria = this.categoriaActiva === "Todos" || p.categoria === this.categoriaActiva;
                const coincideBusqueda = p.nombre.toLowerCase().includes(busq);
                const coincideFavorito = !this.verSoloFavoritos || p.favorito;
                return coincideCategoria && coincideBusqueda && coincideFavorito;
            });

            // 2. Ordenar
            if (orden === "precioAsc") resultado.sort((a, b) => a.precio - b.precio);
            if (orden === "precioDesc") resultado.sort((a, b) => b.precio - a.precio);
            if (orden === "nombreAz") resultado.sort((a, b) => a.nombre.localeCompare(b.nombre));

            this.renderGrid(resultado);
        }

        renderGrid(lista) {
            // Stats
            const total = lista.reduce((sum, p) => sum + p.precio, 0);
            const prom = lista.length ? (total / lista.length).toFixed(2) : 0;
            document.getElementById("stats-bar").innerHTML = `
                <span>${lista.length} productos mostrados | Promedio: $${prom}</span>
                <span id="vistos-totales">Interacciones globales: ${this.vistosGlobales}</span>
            `;

            const grid = document.getElementById("grid-productos");
            grid.innerHTML = "";
            
            if(lista.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color:#888;'>No se encontraron productos.</p>";
                return;
            }

            lista.forEach(p => {
                const claseFav = p.favorito ? "btn-fav es-fav" : "btn-fav";
                const corazon = p.favorito ? "❤️" : "🤍";
                
                grid.innerHTML += `
                    <div class="card" onmouseenter="tienda.registrarVista(${p.id})">
                        <button class="${claseFav}" onclick="tienda.toggleFavorito(${p.id})">${corazon}</button>
                        <div class="card-emoji">${p.emoji}</div>
                        <div class="card-nombre">${p.nombre}</div>
                        <div class="card-precio">$${p.precio.toLocaleString()}</div>
                        <div class="card-cat">${p.categoria}</div>
                        <div id="vistos-${p.id}" style="font-size:10px; color:#aaa; margin-top:8px;">👁️ ${p.vistos}</div>
                    </div>
                `;
            });
        }
    }

    // Adapté los productos al perfil (Estudio, Desarrollo y Entretenimiento)
    const misProductos = [
        new Producto(1, "Curso JavaScript Avanzado", 120000, "Desarrollo", "💻"),
        new Producto(2, "Curso Bases de Datos SQL", 95000, "Desarrollo", "🗄️"),
        new Producto(3, "Libro Romance Dark", 45000, "Lectura", "📖"),
        new Producto(4, "Kit Skincare Bioaqua", 38000, "Cuidado Personal", "🧴"),
        new Producto(5, "Pase de Batalla LoL", 40000, "Gaming", "🎮"),
        new Producto(6, "Licencia VS Code Pro", 15000, "Desarrollo", "⌨️"),
        new Producto(7, "Libro Comedia Romántica", 50000, "Lectura", "📚"),
        new Producto(8, "Suscripción Canva AI", 25000, "Diseño", "🎨")
    ];

    const tienda = new Tienda(misProductos);
</script>
</body>
</html>
